name: AI Pipeline

on:
  push:
    branches:
      - main
      - docs/create-agent-pipeline
  pull_request:
    branches:
      - main

jobs:
  pipeline-check:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Check required pipeline documents
        run: bash scripts/ai/pre-plan.sh

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: package.json
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate code
        run: bash scripts/ai/validate.sh
